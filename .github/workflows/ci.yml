name: Reusable CI

on:
  workflow_call:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup system and python environment
        uses: Swarm-Systems-Lab/ssl_ci/actions/env-setup@v1
        with:
          extras: dev

      # ---- BLOCKING CHECK ----
      # Projects can toggle dev-tooling recipes off skipped - not failed - 
      # when the project doesn't define that recipe.
      - name: Unit tests (gate)
        run: |
          if just --summary | tr ' ' '\n' | grep -qx test; then just test
          else echo "::notice::No 'test' recipe - skipping"; fi

      - name: pre-commit checks
        run: |
          if just --summary | tr ' ' '\n' | grep -qx pre-commit; then just pre-commit
          else echo "::notice::No 'pre-commit' recipe - skipping"; fi

      - name: Lint
        run: |
          if just --summary | tr ' ' '\n' | grep -qx lint; then just lint
          else echo "::notice::No 'lint' recipe - skipping"; fi

      - name: Security scans
        continue-on-error: true
        run: |
          if just --summary | tr ' ' '\n' | grep -qx security; then just security
          else echo "::notice::No 'security' recipe - skipping"; fi

      - name: Typing checks
        continue-on-error: true
        run: |
          if just --summary | tr ' ' '\n' | grep -qx typecheck; then just typecheck
          else echo "::notice::No 'typecheck' recipe - skipping"; fi
