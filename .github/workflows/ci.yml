name: Reusable CI

on:
  workflow_call:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup system and python environment
        uses: Swarm-Systems-Lab/ssl_ci/actions/env-setup@v1

      # ---- BLOCKING CHECK ----
      - name: Unit tests (gate)
        run: just test

      - name: pre-commit checks
        run: just pre-commit

      - name: Lint
        run: just lint

      - name: Security scans
        continue-on-error: true
        run: just security

      - name: Typing checks
        continue-on-error: true
        run: just typecheck
