name: Reusable Publish (native extension)

on:
  workflow_call:
    inputs:
      cibw_build:
        description: "CIBW_BUILD pattern"
        type: string
        default: "cp310-* cp311-* cp312-* cp313-* cp314-*"
      cibw_skip:
        description: "CIBW_SKIP pattern"
        type: string
        default: "pp* *musllinux*"
      cibw_archs_linux:
        description: "CIBW_ARCHS_LINUX"
        type: string
        default: "x86_64"
      cibw_manylinux_x86_64:
        description: "CIBW_MANYLINUX_X86_64"
        type: string
        default: "manylinux_2_28"
    secrets:
      PYPI_USERNAME:
        required: false
      PYPI_PASSWORD:
        required: true
      PYPI_REPOSITORY_URL:
        required: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "Expected a 'refs/tags/v*' ref, got '$GITHUB_REF' - refusing to fabricate a version" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using version: $VERSION"

      - name: Setup system and python environment
        uses: Swarm-Systems-Lab/ssl_ci/actions/env-setup@v1
        with:
          extras: dev,release

      - name: Unit tests (gate)
        run: just test-multi-py

      - name: Build native extension package
        run: ssl-pydev build-native
        env:
          CIBW_ENVIRONMENT: "SETUPTOOLS_SCM_PRETEND_VERSION=${SETUPTOOLS_SCM_PRETEND_VERSION}"
          CIBW_ENVIRONMENT_PASS_LINUX: "SETUPTOOLS_SCM_PRETEND_VERSION"
          CIBW_BUILD: ${{ inputs.cibw_build }}
          CIBW_SKIP: ${{ inputs.cibw_skip }}
          CIBW_ARCHS_LINUX: ${{ inputs.cibw_archs_linux }}
          CIBW_MANYLINUX_X86_64: ${{ inputs.cibw_manylinux_x86_64 }}
          CIBW_BUILD_VERBOSITY: "1"

      - name: Verify dist artifacts
        run: |
          . .venv/bin/activate
          python -m twine check dist/*

      - name: Publish to PyPI
        run: ssl-pydev publish-ci
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
          TWINE_REPOSITORY_URL: ${{ secrets.PYPI_REPOSITORY_URL }}
