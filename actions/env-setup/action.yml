name: "SSL env setup"
description: "Install native build dependencies and bootstrap the uv-managed Python virtualenv"

inputs:
  extras:
    description: "Comma-separated list of optional-dependency extras to pass to uv sync --extra"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install native build dependencies
      shell: bash
      run: |
        sudo apt-get update
        DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          python3-dev

    - name: Bootstrap Python environment
      shell: bash
      run: |
        if [ -n "${{ inputs.extras }}" ]; then
          "${{ github.action_path }}/setup-env.sh" --extras "${{ inputs.extras }}"
        else
          "${{ github.action_path }}/setup-env.sh"
        fi
